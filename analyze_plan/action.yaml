name: "Analyze Terraform Plan"
description: "Analyze Terraform plan JSON output"

inputs:
  plan_file:
    description: "Path to the Terraform plan file (tfplan)"
    required: true

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r $GITHUB_ACTION_PATH/requirements.txt
      shell: bash

    - name: Run analysis
      run: python3 $GITHUB_ACTION_PATH/analyze_plan.py ${{ inputs.plan_file }}
      shell: bash