name: "Analyze Terraform Plan"
description: "Analyze Terraform plan JSON output"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r requirements.txt
      shell: bash

    - name: Run analysis
      run: python analyze_plan.py
      shell: bash